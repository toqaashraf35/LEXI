<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Arial;
      background: #f5f7fb;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      border-top: 5px solid #1A2C5B;
    }

    .logo {
      width: 80px;
      margin-bottom: 20px;
    }

    .code {
      font-size: 28px;
      letter-spacing: 6px;
      font-weight: bold;
      color: #1A2C5B;
      margin: 20px 0;
    }

    .btn {
      background: #1A2C5B;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      display: inline-block;
      text-decoration: none;
      margin-top: 10px;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- logo -->
    <img class="logo" src="https://res.cloudinary.com/dglgwsssn/image/upload/v1778599140/logo_rncc36.png" />

    <h2>Verify your email</h2>

    <p>Use this code to verify your account:</p>

    <div class="code">{{ code }}</div>

    <p>This code will expire soon.</p>

    <div class="footer">
      © 2026 Lexi App
    </div>

  </div>
</body>
</html>
